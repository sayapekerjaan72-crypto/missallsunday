<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Miss All Sunday</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src='https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js'></script>
<script src="https://cdn.jsdelivr.net/npm/canvas@2.11.2/dist/canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&family=Open+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>
  <div class="floating-circle-2"></div>
<div aria-label="Halaman Login" id="loginContainer" role="main">
  <h1 class="login-title">SELAMAT DATANG</h1>
  <form id="loginForm" onsubmit="event.preventDefault(); login();">
    <div style="position: relative;">
      <input aria-label="Masukkan ID" autocomplete="username" id="loginId" name="loginId" placeholder="Username" type="text" required="" />
    </div>
    <div style="position: relative;">
      <input aria-label="Masukkan Password" autocomplete="current-password" id="loginPassword" name="loginPassword" placeholder="Password" type="password" required="" />
    </div>
<div style="text-align:center;font-size:0.7rem;color:#60a5fa;font-weight:bold;">
  <span id="kodeDisplay" style="font-size:1.2rem;font-style:italic;letter-spacing:0.15em;color:#60a5fa;text-shadow:0 0 5px rgba(96,165,250,0.8),0 0 10px rgba(96,165,250,0.5),0 0 15px rgba(96,165,250,0.3);font-family:'Courier New',monospace;font-weight:bold;padding:2px 8px;border-radius:4px;background:rgba(96,165,250,0.15);"></span>
</div>
    <div style="position: relative;">
  <input aria-label="Masukkan Kode Verifikasi" id="kodeVerif" name="kodeVerif" placeholder="Masukkan Kode" type="text" required="" style="text-align:center;text-transform:uppercase;" />
</div>
    <button aria-label="Tombol masuk" type="submit" id="loginBtn" style="margin-top: 0.5rem;">
      <i class="fas fa-rocket mr-3"></i>
      <span id="btnText">MASUK</span>
      <div id="planeLoader" class="login-plane" style="display: none;">✈️</div>
    </button>
  </form>
  <div aria-label="Hak cipta" id="copyright">
    <i aria-hidden="true" class="fas fa-crown"></i> 
    Hak Cipta © 2025-2026 Muhammad Eldhi.
  </div>
</div>
  <div aria-label="Aplikasi Sistem" class="app-container container" id="appContainer" role="main">
    <div class="header-container">
      <div class="header-logo" aria-haspopup="true" aria-expanded="false" aria-label="Menu Akun" tabindex="0" role="button">
        <img alt="Ikon logo akun kepala manusia bergaya minimalis berwarna biru" height="40" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="40"/>
        <div class="logo-dropdown" id="logoDropdown" role="menu" aria-hidden="true">
          <button type="button" aria-label="Ekspor File" id="dropdownExport" role="menuitem"><i class="fas fa-file-export"></i> Ekspor File</button>
          <button type="button" aria-label="Impor File" id="dropdownImport" role="menuitem"><i class="fas fa-file-import"></i> Impor File</button>
          <button type="button" aria-label="Download PDF" id="dropdownPDF" role="menuitem"><i class="fas fa-file-pdf"></i> Download PDF</button>
          <button type="button" aria-label="Logout" id="dropdownLogout" role="menuitem"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
     <h1 class="header-title">MUHAMMAD ELDHI</h1>
<div class="flex space-x-2 items-center ml-auto">
  
  <!-- TANGGAL -->
  <div class="header-date" id="headerDate"></div>
  
  <!-- JAM -->
  <div class="header-time" id="headerTime"></div>
  
</div>

</div>
<form id="dataForm" onsubmit="event.preventDefault(); addData();" class="grid grid-cols-1 gap-6 mb-10 max-w-full p-6 rounded-2xl bg-white/20 backdrop-blur-xl border border-white/20 shadow-lg">

  <!-- BARIS 1: Nama + Passport -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-full">
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">👤 NAMA LENGKAP</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="name" required="" type="text"/>
    </div>
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">🛂 NO PASSPORT</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="passport" required="" type="text"/>
    </div>
  </div>

  <!-- BARIS 2: Hutang RP + RM -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-full">
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">💰 HUTANG (RP)</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="debtRp" inputmode="numeric" pattern="[0-9]*" type="text"/>
    </div>
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">💱 HUTANG (RM)</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="debtRm" inputmode="numeric" pattern="[0-9]*" type="text"/>
    </div>
  </div>

  <!-- BARIS 3: Hutang Bos + Status -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center max-w-full">
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">👑 HUTANG BOS</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="debtBos" inputmode="numeric" pattern="[0-9]*" type="text"/>
    </div>
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">📊 STATUS BAYAR</label>
      <select class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="statusBayar" required="">
        <option class="text-blue-400" disabled="" selected="" value="">Pilih</option>
        <option value="Belum">BELUM</option>
        <option value="Sudah">SUDAH</option>
      </select>
    </div>
  </div>

  <!-- BARIS 4: Tanggal Masuk + Tujuan -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center max-w-full">
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">📅 TANGGAL MASUK</label>
      <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="tanggalMasuk" type="date"/>
    </div>
    <div>
      <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">🗺️ TUJUAN</label>
      <select class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="tujuan" required="">
        <option class="text-blue-400" disabled="" selected="" value="">Pilih</option>
        <option value="KUKUP">KUKUP</option>
        <option value="JOHOR">JOHOR</option>
      </select>
    </div>
  </div>

  <!-- BARIS 5: Tanggal Lahir + Keterangan -->
  <div class="grid grid-cols-2 gap-4">
  <div>
  <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">🎂 TANGGAL LAHIR</label>
  <div class="relative" style="display:flex; align-items:center; width:100%;">
    <!-- Input teks yang bisa copy-paste -->
    <input 
  class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" 
  id="tanggalLahir" 
  type="text"
  oninput="formatTanggalLahir(this)"
  style="padding-right: 40px;"
  />
    <!-- Icon kalender yang bisa diklik untuk cari manual -->
    <i class="fas fa-calendar-alt" 
       style="position: absolute; right: 12px; color: #94a3b8; cursor: pointer;"
       onclick="document.getElementById('tanggalLahirDate').showPicker()"
    ></i>
    <!-- Input date tersembunyi untuk fungsi showPicker() -->
    <input type="date" id="tanggalLahirDate" 
           style="position: absolute; visibility: hidden;" 
           onchange="setTanggalLahirFromPicker(this.value)"
    />
  </div>
</div>
  <div>
    <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">📝 KETERANGAN</label>
    <input class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-600 w-full" id="keterangan" type="text"/>
  </div>
</div>
  <!-- BARIS 6: Foto -->
  <div>
    <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">📷 TAMBAHKAN FOTO</label>
    <input type="file" id="photoInput" accept="image/*" class="p-3 rounded-xl border border-blue-200 bg-white/80 text-slate-900 w-full"/>
  </div>
      <button class="btn bg-blue-700 text-white rounded-xl py-3 px-6 hover:bg-blue-800 w-full md:w-auto self-center shadow-lg" type="submit">➕ Tambah Data</button>
<!-- Input file untuk import (tersembunyi) -->
<input type="file" id="importFile" accept=".json" class="hidden" />
<div class="mt-4" id="pdfUploadContainer">
  <label class="text-xs font-bold text-blue-700 block mb-1 ml-1">📝 TAMBAHKAN FILE MANIFEST</label>
  <div class="flex gap-2" style="max-width:400px;">
    <input type="file" id="pdfUpload" accept="application/pdf" class="p-2 bg-slate-800 text-white" style="flex:1; height:40px; border-radius:8px;"/>
    <button type="button" onclick="autoProcessPDF()" class="p-2 bg-purple-700 text-white" style="flex:1; height:40px; border-radius:8px;">
      🚀 AUTO PROCESS
    </button>
  </div>
</div>
    </form>
    <div class="mb-8 max-w-full mx-auto">
      <input autocomplete="off" class="w-full max-w-2xl mx-auto p-4 rounded-2xl border border-slate-200 bg-white/80 text-slate-900 focus:ring-4 focus:ring-blue-500/50 focus:border-blue-300 shadow-lg hover:shadow-xl transition-all placeholder-slate-500 font-medium text-lg" id="searchInput" oninput="searchData()" placeholder="🔍 Cari Nama Penumpang..." type="text"/>
    </div>
    <div class="table-container max-w-full mx-auto rounded-3xl shadow-2xl overflow-x-auto">
      <table aria-label="Tabel data hutang" class="min-w-full text-blue-300 text-sm" id="dataTable">
        <thead>
          <tr>
  <th scope="col">No</th>
  <th scope="col">Nama</th>
  <th scope="col">Passport</th>
  <th scope="col">RP</th>
  <th scope="col">RM</th>
  <th scope="col">Uang Bos</th>
  <th scope="col">S/B</th>
  <th scope="col">Masuk</th>
  <th scope="col">Lahir</th>
  <th scope="col">Tujuan</th>
  <th scope="col">Keterangan</th>
  <th scope="col">Pilih</th>
</tr>
        </thead>
        <tbody></tbody>
<tfoot>
  <tr>
    <td></td>
    <td></td>
    <td class="text-right font-bold">TOTAL :</td>
    <td id="totalRp" class="font-bold" style="text-align:center;">RP 0</td>
    <td id="totalRm" class="font-bold" style="text-align:center;">RM 0</td>
    <td id="totalBos" class="font-bold" style="text-align:center;">0</td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
  </tr>
</tfoot>
      </table>
    </div>
<div class="flex justify-center items-center gap-4 mt-4">
  <button onclick="prevPage()" class="btn bg-gray-600 text-white px-4 py-2 rounded">⬅ Prev</button>
  <span id="pageInfo" class="text-blue-300 font-bold"></span>
  <button onclick="nextPage()" class="btn bg-blue-700 text-white px-4 py-2 rounded">Next ➡</button>
</div>
</div>
  <script src="script.js"></script>
<div id="photoModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:white; padding:10px; border-radius:10px; max-width:90%;">
    <img id="modalImg" style="max-width:100%; max-height:80vh;" />
    <div style="text-align:center; margin-top:10px;">
      <button onclick="closePhoto()" class="btn bg-red-600 text-white px-4 py-2 rounded">Tutup</button>
    </div>
  </div>
</div>
</body>
</html>
